apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-website-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: food-website
  template:
    metadata:
      labels:
        app: food-website
    spec:
      containers:
      - name: food-website-container
        image: food-website:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: food-website-service
spec:
  type: NodePort
  selector:
    app: food-website
  ports:
  - port: 80
    targetPort: 8000
    nodePort: 30081
